name: Refresh Instagram token

on:
  schedule:
    - cron: "0 6 * * 1" # every Monday 06:00 UTC
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Refresh long-lived token and update the secret
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          # Fine-grained PAT with "Secrets: read and write" on this repo.
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          NEW_TOKEN="$(python -m src.refresh_ig_token)"
          if [ -z "$NEW_TOKEN" ]; then
            echo "No token returned; aborting." >&2
            exit 1
          fi
          gh secret set IG_ACCESS_TOKEN --body "$NEW_TOKEN"
          echo "IG_ACCESS_TOKEN secret updated."
