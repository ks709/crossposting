name: Drip backlog reels

on:
  schedule:
    # Three times a day (UTC) -> ~3 old reels/day with per_run = 1.
    - cron: "0 9,15,21 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crosspost-state
  cancel-in-progress: false

jobs:
  backlog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Post oldest un-posted reel(s)
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: python -m src.main backlog

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/state.json
          git diff --cached --quiet || git commit -m "chore: update crosspost state [skip ci]"
          git push
